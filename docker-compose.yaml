services:
  db:
    image: postgres:16
    container_name: musicplayer-postgres
    environment:
      POSTGRES_DB: musicplayer
      POSTGRES_USER: musicuser
      POSTGRES_PASSWORD: musicpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musicuser -d musicplayer"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: musicplayer-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/musicplayer
      DB_USER: musicuser
      DB_PASSWORD: musicpass
      JWT_SECRET: cOUtd+iZ5rwAF7aOoB3FGFz8y+rvCTEdJbKqek8EjSw=
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"

volumes:
  postgres_data: