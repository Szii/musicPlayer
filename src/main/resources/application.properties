spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/musicplayer}
spring.datasource.username=${DB_USER:musicuser}
spring.datasource.password=${DB_PASSWORD:musicpass}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
logging.level.org.flywaydb=DEBUG
jwt.secret=${JWT_SECRET:cOUtd+iZ5rwAF7aOoB3FGFz8y+rvCTEdJbKqek8EjSw=} // for local development, should be overridden in production
jwt.expiration=${JWT_EXPIRATION:86400000}