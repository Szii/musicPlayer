name: PR CI

on:
 pull_request:
  branches: [ master ]

permissions:
 contents: read

jobs:
 verify:
  runs-on: ubuntu-latest

  steps:
   - name: Checkout
     uses: actions/checkout@v5

   - name: Set up JDK 23
     uses: actions/setup-java@v5
     with:
      distribution: temurin
      java-version: '23'
      cache: maven

   - name: Verify build and run tests
     run: mvn --batch-mode --no-transfer-progress verify